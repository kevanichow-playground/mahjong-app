<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9388 Mckim Way 麻雀龍虎榜</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--gold:#c9a84c;--gold-light:#e8c97a;--red:#c0392b;--ink:#0d0d0d;--paper:#f5efe0;--paper-dark:#ede4cc;--green:#27ae60;--smoke:#1a1714;--muted:#7a6e5f;--jade:#00857a;--purple:#8e44ad;--blue:#2980b9}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--paper);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.3}

/* HERO */
.hero{position:relative;text-align:center;padding:48px 20px 32px;background:linear-gradient(180deg,#1a1208 0%,var(--ink) 100%);border-bottom:2px solid var(--gold);overflow:hidden}
.hero::before{content:'🀄';position:absolute;font-size:260px;opacity:.04;top:-50px;left:50%;transform:translateX(-50%);pointer-events:none}
.hero-sub{font-size:10px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;opacity:.8}
.hero-title{font-family:'Noto Serif TC',serif;font-weight:900;font-size:clamp(26px,6vw,66px);color:var(--gold);text-shadow:0 0 40px rgba(201,168,76,.4);letter-spacing:.08em}
.hero-title span{color:var(--paper)}
.hero-meta{margin-top:12px;font-size:10px;color:var(--muted);letter-spacing:.2em}
.hero-kpis{display:flex;justify-content:center;gap:32px;margin-top:24px;flex-wrap:wrap}
.kpi{text-align:center}
.kpi-num{font-family:'Bebas Neue',cursive;font-size:38px;color:var(--gold);line-height:1}
.kpi-label{font-size:9px;color:var(--muted);letter-spacing:.2em;margin-top:3px}

/* TABS */
.tabs{display:flex;justify-content:center;gap:3px;padding:16px;background:#0a0a0a;border-bottom:1px solid #1a1a1a;flex-wrap:wrap;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.tab-btn{background:transparent;border:1px solid #2a2520;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;padding:7px 14px;cursor:pointer;letter-spacing:.08em;transition:all .2s;border-radius:2px}
.tab-btn:hover{border-color:var(--gold);color:var(--gold)}
.tab-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700}

/* SECTIONS */
.section{display:none;padding:28px 16px;max-width:1200px;margin:0 auto}
.section.active{display:block}
.sec-title{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--gold);margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #1e1c19;display:flex;align-items:center;gap:10px}
.sec-title::before{content:'';display:inline-block;width:3px;height:20px;background:var(--gold);border-radius:2px}

/* LEADERBOARD */
.lb{display:flex;flex-direction:column;gap:6px}
.lb-row{display:grid;grid-template-columns:44px 1fr 90px 85px 80px 70px;align-items:center;gap:10px;padding:12px 18px;background:#161210;border:1px solid #1e1c19;border-radius:3px;cursor:pointer;transition:all .2s;animation:slideIn .35s ease backwards}
@keyframes slideIn{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
.lb-row:hover{border-color:var(--gold);background:#1d1810}
.lb-row.top3{border-color:var(--gold);background:linear-gradient(90deg,#1d1508 0%,#161210 100%)}
.lb-rank{font-family:'Bebas Neue',cursive;font-size:26px;text-align:center;color:var(--muted)}
.lb-row.r1 .lb-rank{color:#FFD700;font-size:30px}
.lb-row.r2 .lb-rank{color:#C0C0C0;font-size:28px}
.lb-row.r3 .lb-rank{color:#CD7F32}
.lb-name{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700}
.lb-sub{font-size:9px;color:var(--muted);letter-spacing:.1em;margin-top:1px}
.lb-total{font-family:'Bebas Neue',cursive;font-size:24px;text-align:right}
.pos{color:var(--green)}.neg{color:var(--red)}.gold{color:var(--gold)}
.lb-wr{text-align:center;font-size:12px}
.wr-bar-bg{height:5px;background:#222;border-radius:3px;margin-top:3px}
.wr-bar{height:100%;border-radius:3px;background:var(--jade);transition:width .8s}
.lb-plays{font-size:11px;color:var(--muted);text-align:center}
.lb-day{font-size:9px;color:var(--gold);text-align:right;letter-spacing:.1em}

/* CHARTS */
.chart-box{background:#161210;border:1px solid #1e1c19;border-radius:5px;padding:18px;margin-bottom:18px}
.chart-label{font-size:9px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:14px}
.chart-h{height:380px}.chart-m{height:280px}.chart-s{height:220px}

/* DOW GRID */
.dow-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.dow-card{background:#161210;border:1px solid #1e1c19;border-radius:5px;padding:18px;animation:fadeUp .4s ease backwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.dow-head{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.best-tag{background:var(--gold);color:var(--ink);font-size:8px;padding:2px 7px;font-family:'Space Mono',monospace;letter-spacing:.1em}
.dow-bars{display:flex;gap:3px;align-items:flex-end}
.dow-bar-col{flex:1;text-align:center}
.dow-bar-label{font-size:8px;color:var(--muted);margin-bottom:3px}
.dow-bar-wrap{height:55px;display:flex;align-items:flex-end;justify-content:center}
.dow-bar{width:100%;border-radius:2px 2px 0 0;min-height:3px}
.db-pos{background:var(--jade)}.db-neg{background:var(--red)}.db-best{background:var(--gold)!important}.db-zero{width:100%;height:1px;background:#222}
.dow-bar-val{font-size:8px;margin-top:3px;font-family:'Space Mono',monospace}

/* PROFILES */
.ps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px;margin-bottom:24px}
.ps-btn{background:#161210;border:1px solid #1e1c19;color:var(--paper);font-family:'Noto Serif TC',serif;font-size:13px;padding:10px 6px;cursor:pointer;text-align:center;border-radius:3px;transition:all .2s}
.ps-btn:hover{border-color:var(--gold)}
.ps-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700}
.ps-total{font-family:'Bebas Neue',cursive;font-size:15px;display:block;margin-top:3px}
.ps-btn.active .ps-total{color:var(--ink)}
.profile-wrap{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.p-header{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap;align-items:flex-start}
.p-avatar{width:72px;height:72px;background:linear-gradient(135deg,var(--smoke),#1a1208);border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:26px;font-weight:900;color:var(--gold);flex-shrink:0}
.p-info{flex:1;min-width:180px}
.p-name{font-family:'Noto Serif TC',serif;font-size:28px;font-weight:900;color:var(--gold)}
.p-rank{display:inline-block;background:var(--gold);color:var(--ink);font-family:'Bebas Neue',cursive;font-size:16px;padding:2px 10px;margin-top:5px}
.p-kpis{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.p-kpi{text-align:center;background:#161210;border:1px solid #1e1c19;padding:9px 14px;border-radius:3px;min-width:72px}
.p-kpi-num{font-family:'Bebas Neue',cursive;font-size:22px;line-height:1}
.p-kpi-label{font-size:8px;color:var(--muted);letter-spacing:.15em;margin-top:2px}
.p-bestday-box{text-align:center;background:#161210;border:1px solid #1e1c19;padding:14px 18px;border-radius:3px}
.p-charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
@media(max-width:650px){.p-charts{grid-template-columns:1fr}.lb-wr,.lb-plays,.lb-day{display:none}.lb-row{grid-template-columns:38px 1fr 70px}}
.streak-dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.dot{width:9px;height:9px;border-radius:50%}
.dot-w{background:var(--jade)}.dot-l{background:var(--red)}.dot-z{background:#333}

/* TREND / PREDICTION */
.trend-legend{display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap}
.tl-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.tl-line{width:20px;height:2px}
.momentum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:20px}
.mom-card{background:#161210;border:1px solid #1e1c19;border-radius:4px;padding:16px;animation:fadeUp .4s ease backwards}
.mom-name{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;margin-bottom:8px}
.mom-val{font-family:'Bebas Neue',cursive;font-size:28px}
.mom-bar-bg{height:8px;background:#1a1a1a;border-radius:4px;margin:6px 0}
.mom-bar{height:100%;border-radius:4px;transition:width 1s}

/* ODDS */
.odds-setup{background:#161210;border:1px solid var(--gold);border-radius:5px;padding:20px;margin-bottom:24px}
.odds-setup h3{font-family:'Noto Serif TC',serif;font-size:16px;color:var(--gold);margin-bottom:14px}
.player-checkboxes{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.px-chk{display:flex;align-items:center;gap:6px;background:#0d0d0d;border:1px solid #2a2520;padding:6px 12px;border-radius:3px;cursor:pointer;transition:all .2s;font-size:12px;font-family:'Noto Serif TC',serif;user-select:none}
.px-chk.checked{background:#1d1508;border-color:var(--gold);color:var(--gold)}
.px-chk input{display:none}
.day-select{background:#0d0d0d;border:1px solid #2a2520;color:var(--paper);font-family:'Space Mono',monospace;font-size:12px;padding:7px 12px;border-radius:3px;margin-right:10px}
.btn-primary{background:var(--gold);color:var(--ink);border:none;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;padding:9px 20px;cursor:pointer;border-radius:2px;letter-spacing:.1em;transition:all .2s}
.btn-primary:hover{background:var(--gold-light)}
.btn-secondary{background:transparent;color:var(--gold);border:1px solid var(--gold);font-family:'Space Mono',monospace;font-size:11px;padding:7px 16px;cursor:pointer;border-radius:2px;transition:all .2s}
.btn-secondary:hover{background:var(--gold);color:var(--ink)}
.odds-results{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.odds-row{display:grid;grid-template-columns:30px 1fr 70px 70px 200px;align-items:center;gap:12px;padding:14px 18px;background:#161210;border:1px solid #1e1c19;border-radius:4px;animation:slideIn .3s ease backwards}
.odds-row.fav{border-color:var(--gold);background:linear-gradient(90deg,#1d1508,#161210)}
.odds-pos{font-family:'Bebas Neue',cursive;font-size:22px;text-align:center}
.odds-name{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700}
.odds-decimal{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--gold)}
.odds-prob{font-size:12px;color:var(--muted)}
.odds-bars{display:flex;flex-direction:column;gap:3px}
.odds-bar-row{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--muted)}
.odds-bar-bg{flex:1;height:4px;background:#1a1a1a;border-radius:2px}
.odds-bar-fill{height:100%;border-radius:2px;transition:width .8s}

/* INPUT SCORES */
.input-form{background:#161210;border:1px solid #1e1c19;border-radius:5px;padding:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:10px;color:var(--muted);letter-spacing:.2em}
.form-input{background:#0d0d0d;border:1px solid #2a2520;color:var(--paper);font-family:'Space Mono',monospace;font-size:13px;padding:9px 12px;border-radius:3px;outline:none;transition:border .2s;width:100%}
.form-input:focus{border-color:var(--gold)}
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:20px}
.score-item{display:flex;align-items:center;gap:10px;background:#0d0d0d;border:1px solid #1e1c19;padding:10px 14px;border-radius:3px}
.score-player{font-family:'Noto Serif TC',serif;font-size:14px;flex:1}
.score-input{background:transparent;border:none;border-bottom:1px solid #2a2520;color:var(--paper);font-family:'Space Mono',monospace;font-size:14px;width:80px;text-align:right;outline:none;padding:2px}
.score-input:focus{border-bottom-color:var(--gold)}
.sum-display{font-size:12px;text-align:right;margin-bottom:16px;color:var(--muted)}
.sum-display span{font-family:'Bebas Neue',cursive;font-size:18px}
.sessions-history{display:flex;flex-direction:column;gap:6px;margin-top:24px}
.sess-item{display:flex;justify-content:space-between;align-items:center;background:#0d0d0d;border:1px solid #1e1c19;padding:10px 16px;border-radius:3px;font-size:12px}
.sess-date{color:var(--gold);font-family:'Bebas Neue',cursive;font-size:16px}
.sess-players{color:var(--muted);font-size:10px;margin-top:2px}
.del-btn{background:transparent;border:1px solid #333;color:#555;font-size:10px;padding:4px 10px;cursor:pointer;border-radius:2px;transition:all .2s}
.del-btn:hover{border-color:var(--red);color:var(--red)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--gold);color:var(--ink);padding:12px 20px;border-radius:3px;font-size:12px;font-weight:700;z-index:9998;animation:toastIn .3s ease;display:none}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.loading{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.error-msg{color:var(--red);font-size:12px;margin-top:8px}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-sub">9388 Mckim Way · 為名譽之戰</div>
  <h1 class="hero-title">麻雀<span>龍虎榜</span></h1>
  <div class="hero-meta" id="hero-meta">載入中...</div>
  <div class="hero-kpis">
    <div class="kpi"><div class="kpi-num" id="kpi-sessions">-</div><div class="kpi-label">總場次</div></div>
    <div class="kpi"><div class="kpi-num" id="kpi-players">-</div><div class="kpi-label">參賽人數</div></div>
    <div class="kpi"><div class="kpi-num" id="kpi-leader" style="font-size:24px">-</div><div class="kpi-label">總榜首</div></div>
    <div class="kpi"><div class="kpi-num" id="kpi-best-wr" style="color:#00857a">-</div><div class="kpi-label">最高勝率</div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('lb')">🏆 龍虎榜</button>
  <button class="tab-btn" onclick="showTab('wr')">📊 勝率圖</button>
  <button class="tab-btn" onclick="showTab('dow')">📅 星期運勢</button>
  <button class="tab-btn" onclick="showTab('profile')">👤 個人檔案</button>
  <button class="tab-btn" onclick="showTab('trend')">📈 走勢預測</button>
  <button class="tab-btn" onclick="showTab('odds')">🎲 賠率投注</button>
  <button class="tab-btn" onclick="showTab('input')">✏️ 輸入分數</button>
</div>

<div id="tab-lb" class="section active"><div class="loading">載入中...</div></div>
<div id="tab-wr" class="section"><div class="loading">載入中...</div></div>
<div id="tab-dow" class="section"><div class="loading">載入中...</div></div>
<div id="tab-profile" class="section"><div class="loading">載入中...</div></div>
<div id="tab-trend" class="section"><div class="loading">載入中...</div></div>
<div id="tab-odds" class="section"><div class="loading">載入中...</div></div>
<div id="tab-input" class="section"><div class="loading">載入中...</div></div>

<div class="toast" id="toast"></div>

<script>
const DOW = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DOW_ZH = ['一','二','三','四','五','六','日'];
const TREND_COLORS = ['#c9a84c','#00857a','#c0392b','#8e44ad','#e67e22','#2980b9','#e74c3c','#1abc9c'];

let APP = { sessions: [], players: [] };
let activeTab = 'lb';
let activePlayer = null;
const charts = {};

// ── DATA LOAD ──
async function loadData() {
  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    APP.sessions = data.sessions;
    APP.players = data.players;
    renderAll();
  } catch (e) {
    document.querySelectorAll('.loading').forEach(el => el.textContent = '連線失敗，請重新整理');
    console.error(e);
  }
}

function renderAll() {
  updateHero();
  renderLeaderboard();
  renderWinrate();
  renderDow();
  renderProfileSelector();
  renderTrend();
  renderOddsSetup();
  renderInput();
}

// ── HERO ──
function updateHero() {
  const { sessions, players } = APP;
  const mainPlayers = players.filter(p => p.plays >= 3);
  const leader = players[0];
  const bestWR = [...mainPlayers].sort((a, b) => b.winrate - a.winrate)[0];
  const firstDate = sessions[0]?.date || '';
  const lastDate = sessions[sessions.length - 1]?.date || '';
  document.getElementById('hero-meta').textContent = `${firstDate} — ${lastDate}`;
  document.getElementById('kpi-sessions').textContent = sessions.length;
  document.getElementById('kpi-players').textContent = players.length;
  document.getElementById('kpi-leader').textContent = leader?.name || '-';
  document.getElementById('kpi-best-wr').textContent = bestWR ? `${bestWR.name} ${bestWR.winrate}%` : '-';
}

// ── TAB ──
function showTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.currentTarget.classList.add('active');
  activeTab = tab;
}

// ── LEADERBOARD ──
function renderLeaderboard() {
  const el = document.getElementById('tab-lb');
  const { players } = APP;
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = `<div class="sec-title">總排行榜</div><div class="lb" id="lb-list"></div>`;
  const list = document.getElementById('lb-list');
  players.forEach((p, i) => {
    const sign = p.total >= 0 ? '+' : '';
    const tc = p.total >= 0 ? 'pos' : 'neg';
    const rc = i < 3 ? `top3 r${i+1}` : '';
    const rankLabel = i < 3 ? medals[i] : p.rank;
    const dow = DOW_ZH[DOW.indexOf(p.bestDay)] || '-';
    const div = document.createElement('div');
    div.className = `lb-row ${rc}`;
    div.style.animationDelay = `${i * 0.035}s`;
    div.onclick = () => { showTabByName('profile'); selectPlayer(p.name); };
    div.innerHTML = `
      <div class="lb-rank">${rankLabel}</div>
      <div><div class="lb-name">${p.name}</div><div class="lb-sub">${p.plays}場 · 場均${p.avgPerPlay > 0 ? '+' : ''}${p.avgPerPlay}</div></div>
      <div class="lb-total ${tc}">${sign}${p.total}</div>
      <div class="lb-wr"><div>${p.winrate}%</div><div class="wr-bar-bg"><div class="wr-bar" style="width:${p.winrate}%"></div></div></div>
      <div class="lb-plays">${p.wins}勝 ${p.losses}負</div>
      <div class="lb-day">🍀 週${dow}</div>`;
    list.appendChild(div);
  });
}

function showTabByName(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => { if (b.textContent.includes('個人')) b.classList.add('active'); });
}

// ── WIN RATE CHART ──
function renderWinrate() {
  const el = document.getElementById('tab-wr');
  el.innerHTML = `
    <div class="sec-title">勝率 & 場次</div>
    <div class="chart-box"><div class="chart-label">各玩家勝負場數 (≥3場)</div><div class="chart-h"><canvas id="wr-chart"></canvas></div></div>
    <div class="sec-title">累積財富走勢 (主要玩家)</div>
    <div class="chart-box"><div class="chart-label">主要玩家累積點數 (≥5場)</div><div class="chart-h"><canvas id="trend-main-chart"></canvas></div></div>`;

  setTimeout(() => {
    buildWrChart();
    buildTrendMainChart();
  }, 50);
}

function computeRadar(p) {
  const all = APP.players;
  const totals = all.map(x => x.total);
  const mn = Math.min(...totals), mx = Math.max(...totals), rng = mx - mn || 1;
  const avgs = all.map(x => x.avgPerPlay);
  const mna = Math.min(...avgs), mxa = Math.max(...avgs), rnga = mxa - mna || 1;

  return [
    Math.round(((p.total - mn) / rng) * 100),
    Math.round(p.winrate),
    Math.round(Math.max(0, 100 - (Math.abs(p.toploss) / (Math.max(Math.abs(p.topwin), Math.abs(p.toploss)) || 1)) * 100)),
    Math.round((p.plays / Math.max(...all.map(x => x.plays))) * 100),
    Math.round(((p.avgPerPlay - mna) / rnga) * 100),
    Math.round((p.wins / Math.max(p.plays, 1)) * 100)
  ].map(v => Math.max(0, Math.min(100, v)));
}

function buildRadarChart(p) {
  const ctx = document.getElementById('radar-chart')?.getContext('2d');

  charts.radar = new Chart(ctx, {

function buildPlayerMaChart() {
  if (charts.ma) charts.ma.destroy();
  const name = document.getElementById('trend-player-select')?.value || APP.players.find(p => p.plays >= 5)?.name;
  const p = APP.players.find(x => x.name === name);
  if (!p) return;
  const ctx = document.getElementById('ma-chart')?.getContext('2d');
  if (!ctx) return;

  const sorted = [...p.trend].sort((a,b) => a.date.localeCompare(b.date));
  const labels = sorted.map(d => d.date.slice(5));
  const amounts = sorted.map(d => d.amount);
  const ma3 = sorted.map((_, i) => i < 2 ? null : Math.round((amounts[i] + amounts[i-1] + amounts[i-2]) / 3 * 10) / 10);
  const ma5 = sorted.map((_, i) => i < 4 ? null : Math.round((amounts.slice(i-4, i+1).reduce((a,b)=>a+b,0) / 5) * 10) / 10);

  // Predict next 2 sessions from linear regression of last 5
  const last5 = amounts.slice(-5);
  const n = last5.length;
  const xs = Array.from({length: n}, (_, i) => i);
  const sumX = xs.reduce((a,b)=>a+b,0), sumY = last5.reduce((a,b)=>a+b,0);
  const sumXY = xs.reduce((a,i)=>a+i*last5[i],0), sumX2 = xs.reduce((a,x)=>a+x*x,0);
  const slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
  const intercept = (sumY - slope*sumX) / n;
  const pred1 = Math.round((slope*n + intercept) * 10) / 10;
  const pred2 = Math.round((slope*(n+1) + intercept) * 10) / 10;

  const extLabels = [...labels, '預測+1', '預測+2'];
  const extAmounts = [...amounts, null, null];
  const extMa3 = [...ma3, null, null];
  const extMa5 = [...ma5, null, null];
  const predLine = [...Array(amounts.length - 1).fill(null), amounts[amounts.length-1], pred1, pred2];

  charts.ma = new Chart(ctx, {
    type: 'line',
    data: {
      labels: extLabels,
      datasets: [
        { label: '每場實績', data: extAmounts, borderColor: '#c9a84c', backgroundColor: 'rgba(201,168,76,.07)', fill: true, borderWidth: 2, pointRadius: 3, tension: 0.1 },
        { label: '3場均線', data: extMa3, borderColor: '#00857a', borderWidth: 2, pointRadius: 0, tension: 0.4, spanGaps: false },
        { label: '5場均線', data: extMa5, borderColor: '#8e44ad', borderDash: [5,3], borderWidth: 2, pointRadius: 0, tension: 0.4, spanGaps: false },
        { label: '趨勢預測', data: predLine, borderColor: '#e67e22', borderDash: [8,4], borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#e67e22', tension: 0.1, spanGaps: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#7a6e5f', font: { size: 10 } } },
        annotation: {}
      },
      scales: {
        x: { ticks: { color: '#555', font: { size: 9 }, maxTicksLimit: 16 }, grid: { color: '#111' } },
        y: { ticks: { color: '#7a6e5f', font: { size: 10 } }, grid: { color: '#1a1a1a' } }
      }
    }
  });
}

function buildMomentumGrid() {
  const grid = document.getElementById('momentum-grid');
  if (!grid) return;
  const sorted = APP.players.filter(p => p.plays >= 4).sort((a, b) => b.momentum - a.momentum);

  sorted.forEach((p, i) => {
    const isUp = p.momentum > 0;

    const card = document.createElement('div');

    card.innerHTML = `

function renderOddsResults(odds, day) {
  const container = document.getElementById('odds-results');
  const dayZh = '週' + DOW_ZH[DOW.indexOf(day)];
  container.innerHTML = `<div class="sec-title" style="margin-top:24px">${dayZh} 賠率預測</div>
    <div class="odds-results">
      ${odds.map((o, i) => {
        const isFav = i === 0;
        const rankLabel = i === 0 ? '🏆 大熱門' : i === 1 ? '🥈 次熱' : i === 2 ? '🥉 三位' : `第${i+1}位`;
        return `<div class="odds-row ${isFav ? 'fav' : ''}" style="animation-delay:${i*0.07}s">
          <div class="odds-pos" style="color:${isFav ? 'var(--gold)' : 'var(--muted)'}">${i+1}</div>
          <div>
            <div class="odds-name">${o.name}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">${rankLabel} · ${o.momentum}</div>
          </div>
          <div>
            <div class="odds-decimal">${o.odds}x</div>
            <div class="odds-prob">${o.winProb}%</div>
          </div>
          <div style="font-size:10px;color:var(--muted);text-align:right">場均<br><span style="color:${o.avgGain >= 0 ? 'var(--green)' : 'var(--red)'};font-family:'Bebas Neue',cursive;font-size:16px">${o.avgGain >= 0 ? '+' : ''}${o.avgGain}</span></div>
          <div class="odds-bars">
            <div class="odds-bar-row"><span style="width:40px">歷史</span><div class="odds-bar-bg"><div class="odds-bar-fill" style="width:${o.baseWR}%;background:var(--jade)"></div></div><span>${o.baseWR}%</span></div>
            <div class="odds-bar-row"><span style="width:40px">近5場</span><div class="odds-bar-bg"><div class="odds-bar-fill" style="width:${o.recentWR}%;background:var(--blue)"></div></div><span>${o.recentWR}%</span></div>
            <div class="odds-bar-row"><span style="width:40px">${dayZh}</span><div class="odds-bar-bg"><div class="odds-bar-fill" style="width:${o.dowWR}%;background:var(--gold)"></div></div><span>${o.dowWR}%</span></div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

// ── INPUT SCORES ──
function renderInput() {
  const el = document.getElementById('tab-input');
  const allNames = [...new Set(APP.players.map(p => p.name))].sort();
  el.innerHTML = `
    <div class="sec-title">輸入新一場分數</div>
    <div class="input-form">
      <div class="form-row">
        <div class="form-group">
          <div class="form-label">日期</div>
          <input type="date" class="form-input" id="inp-date" value="${new Date().toISOString().slice(0,10)}">
        </div>
        <div class="form-group">
          <div class="form-label">備註（可選）</div>
          <input type="text" class="form-input" id="inp-notes" placeholder="例：聖誕特備局">
        </div>
      </div>
      <div class="form-label" style="margin-bottom:10px">參賽者分數（正數 = 贏，負數 = 輸，空白 = 未出席）</div>
      <div class="score-grid">
        ${allNames.map(n => `
          <div class="score-item">
            <div class="score-player">${n}</div>
            <input type="number" class="score-input" id="score-${safeName(n)}" placeholder="分數" step="0.1" data-name="${n}">
          </div>`).join('')}
        <div class="score-item" id="new-player-item" style="grid-column:1/-1">
          <input type="text" class="form-input" id="new-player-name" placeholder="新增玩家名稱（可選）" style="flex:1;margin-right:8px">
          <input type="number" class="score-input" id="new-player-score" placeholder="分數" step="0.1" style="width:100px">
        </div>
      </div>
      <div class="sum-display">合計：<span id="score-sum" class="gold">0</span></div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="btn-primary" onclick="submitScores()">✅ 提交分數</button>
        <button class="btn-secondary" onclick="clearScores()">清除</button>
        <div id="submit-error" class="error-msg"></div>
      </div>
    </div>

    <div class="sec-title" style="margin-top:28px">歷史場次記錄</div>
    <div class="sessions-history" id="sessions-history"></div>`;

  // Live sum
  document.querySelectorAll('.score-input').forEach(inp => inp.addEventListener('input', updateSum));
  renderSessionsHistory();
}

function updateSum() {
  const vals = [...document.querySelectorAll('.score-input[data-name]')]
    .map(i => parseFloat(i.value) || 0);
  const newP = parseFloat(document.getElementById('new-player-score')?.value) || 0;
  const total = vals.reduce((a, b) => a + b, 0) + newP;
  const el = document.getElementById('score-sum');
  if (el) { el.textContent = Math.round(total * 10) / 10; el.className = Math.abs(total) < 0.5 ? 'gold' : (total > 0 ? 'pos' : 'neg'); }
}

function clearScores() {
  document.querySelectorAll('.score-input').forEach(i => i.value = '');
  document.getElementById('new-player-name').value = '';
  document.getElementById('new-player-score').value = '';
  updateSum();
}

async function submitScores() {
  const date = document.getElementById('inp-date').value;
  const notes = document.getElementById('inp-notes').value;
  const errEl = document.getElementById('submit-error');
  if (!date) { errEl.textContent = '請選擇日期'; return; }

  const results = {};
  document.querySelectorAll('.score-input[data-name]').forEach(inp => {
    const v = inp.value.trim();
    if (v !== '') results[inp.dataset.name] = parseFloat(v);
  });
  const newName = document.getElementById('new-player-name').value.trim();
  const newScore = document.getElementById('new-player-score').value.trim();
  if (newName && newScore) results[newName] = parseFloat(newScore);

  if (Object.keys(results).length < 2) { errEl.textContent = '至少需要2位參賽者'; return; }

  const sum = Object.values(results).reduce((a, b) => a + b, 0);
  if (Math.abs(sum) > 2) {
    if (!confirm(`分數合計為 ${Math.round(sum*10)/10}，不等於0，確認提交？`)) return;
  }

  const res = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date, results, notes })
  });
  const data = await res.json();
  if (data.success) {
    showToast('✅ 分數已更新！正在重新整理...');
    errEl.textContent = '';
    clearScores();
    await loadData();
  } else {
    errEl.textContent = '提交失敗: ' + data.error;
  }
}

function renderSessionsHistory() {
  const container = document.getElementById('sessions-history');
  if (!container) return;
  const sorted = [...APP.sessions].sort((a, b) => b.date.localeCompare(a.date));
  container.innerHTML = sorted.slice(0, 20).map(s => {
    const players = Object.entries(s.results)
      .sort((a, b) => b[1] - a[1])
      .map(([name, amt]) => `<span style="color:${amt > 0 ? 'var(--jade)' : 'var(--red)'}">${name}:${amt > 0 ? '+' : ''}${amt}</span>`)
      .join(' · ');
    return `<div class="sess-item">
      <div>
        <div class="sess-date">${s.date}</div>
        <div class="sess-players" style="margin-top:3px;line-height:1.6">${players}</div>
        ${s.notes ? `<div style="font-size:10px;color:var(--gold);margin-top:2px">${s.notes}</div>` : ''}
      </div>
      <button class="del-btn" onclick="deleteSession(${s.id})">刪除</button>
    </div>`;
  }).join('');
}

async function deleteSession(id) {
  if (!confirm('確認刪除這場記錄？')) return;
  await fetch('/api/sessions/' + id, { method: 'DELETE' });
  showToast('已刪除');
  await loadData();
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

// ── INIT ──
loadData();
</script>
</body>
</html>
